let aC=null;
function gC(){if(!aC)try{aC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}if(aC&&aC.state==='suspended')aC.resume();return aC;}
function tn(f,d,tp,v,dl){const c=gC();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type=tp||'sine';o.frequency.value=f;const t=c.currentTime+(dl||0);g.gain.setValueAtTime(v||.32,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+d);}
function sC(){[523,659,784,1047].forEach((f,i)=>tn(f,.28,'sine',.35,i*.1));}
function sW(){const c=gC();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type='square';const t=c.currentTime;o.frequency.setValueAtTime(220,t);o.frequency.setValueAtTime(170,t+.09);o.frequency.setValueAtTime(110,t+.2);g.gain.setValueAtTime(.44,t);g.gain.setValueAtTime(.44,t+.28);g.gain.exponentialRampToValueAtTime(.001,t+.58);o.connect(g);g.connect(c.destination);o.start();o.stop(t+.58);}
function sRT(){tn(360,.22,'sine',.18);setTimeout(()=>tn(260,.18,'sine',.12),80);}
function sRP(){tn(880,.18,'sine',.28);setTimeout(()=>tn(1108,.22,'sine',.22),90);}
function sFanfare(){[523,659,784,1047,1319,1568].forEach((f,i)=>tn(f,.35,'sine',.4,i*.12));}

// ── State ──────────────────────────────────────────────────────────
let mode=null,bc=null,bcOk=false;
let screen='setup',names=['Команда 1','Команда 2','Команда 3','Команда 4'];
let totals=[0,0,0,0],qi=0,st=0,at=0,maxQ=1;
let revealed=new Map(),elim=new Set(),rs=[0,0,0,0];
let rPhase='play',rq=[],overlayOn=false,notif=null,popIdx=null;
let startTeam=0,displayOk=false,waitHost=true,splashKey=null;
let nT,pT,eT,wrT,spT,nrT;

function setupBC(){try{bc=new BroadcastChannel('gs9');bc.onmessage=onMsg;bcOk=true;}catch(e){bcOk=false;}}
function push(){if(!bc)return;bc.postMessage({t:'s',d:{screen,names,totals,qi,st,at,rv:[...revealed.entries()],el:[...elim],rs,rPhase,rq,overlayOn,notif,startTeam,maxQ,popIdx}});}
function pushFlash(){if(bc)bc.postMessage({t:'flash'});}
function onMsg(e){
  const m=e.data;
  if(mode==='host'&&m.t==='ping'){displayOk=true;push();render();}
  else if(mode==='display'&&m.t==='s'){applyState(m.d);}
  else if(mode==='display'&&m.t==='flash'){flashWrong();}
  else if(mode==='display'&&m.t==='gflash'){flashCorrect();}
  else if(mode==='display'&&m.t==='confetti'){spawnConfetti();}
}
function applyState(d){
  waitHost=false;screen=d.screen;names=d.names;totals=d.totals;qi=d.qi;st=d.st;at=d.at;
  revealed=new Map(d.rv);elim=new Set(d.el);rs=d.rs;rPhase=d.rPhase;rq=d.rq;
  overlayOn=d.overlayOn;notif=d.notif;startTeam=d.startTeam;maxQ=d.maxQ||1;popIdx=d.popIdx;
  render();
}

// ── Confetti ───────────────────────────────────────────────────────
function spawnConfetti(){
  const colors=['#f5c518','#ff453a','#30d158','#0a84ff','#bf5af2','#ff9f0a','#64d2ff','#ff8a80','#fff'];
  for(let i=0;i<90;i++){
    const d=document.createElement('div');
    const sz=6+Math.random()*11;
    const dur=1.8+Math.random()*2.4;
    const delay=Math.random()*2;
    d.style.cssText=`position:fixed;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}vw;top:-30px;border-radius:${Math.random()>.4?'50%':'3px'};z-index:9998;pointer-events:none;animation:confettiFall ${dur}s ${delay}s ease-in forwards`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),(dur+delay)*1000+200);
  }
}

// ── Game Logic ─────────────────────────────────────────────────────
function note(msg,type){if(nT)clearTimeout(nT);notif={msg,type};push();render();nT=setTimeout(()=>{notif=null;push();render();},3000);}
function popAt(i){if(pT)clearTimeout(pT);popIdx=i;push();render();pT=setTimeout(()=>{popIdx=null;if(!overlayOn){push();render();}},1400);}
function saveName(i){const e=document.getElementById('i'+i);if(e)names[i]=e.value||names[i];}
function saveAll(){for(let i=0;i<4;i++)saveName(i);}
function setStartTeam(i){saveAll();startTeam=i;render();}
function selectTeam(i){if(rPhase!=='play'||elim.has(i))return;at=i;push();render();}

function onCorrect(i){
  if(rPhase!=='play'||revealed.has(i))return;
  const pts=QS[qi].a[i][1];
  revealed.set(i,'team');popAt(i);rs[at]+=pts;sC();
  flashCorrect();
  if(bc)bc.postMessage({t:'gflash'});
  push();
  if(revealed.size>=QS[qi].a.length)setTimeout(doEnd,1000);
}

function flashWrong(){
  const d=document.createElement('div');d.className='wflash';document.body.appendChild(d);setTimeout(()=>d.remove(),850);
}
function flashCorrect(){
  const d=document.createElement('div');d.className='gflash';document.body.appendChild(d);setTimeout(()=>d.remove(),750);
}

// ── Animated splash: user's video, seamless crossfade loop ─────────
function splashHTML(statusHTML){
  return`<div class="tvroot" style="background:none">
    <video id="sv1" class="splashvid" src="anim gif.mp4" autoplay muted playsinline aria-hidden="true" tabindex="-1" style="opacity:1"></video>
    <video id="sv2" class="splashvid" src="anim gif.mp4" muted playsinline preload="auto" aria-hidden="true" tabindex="-1" style="opacity:0"></video>
    <div class="splashveil"></div>
    <div class="splashfg"><div style="margin-top:64vh">${statusHTML}</div></div>
  </div>`;
}
function initSplashFade(){
  const a=document.getElementById('sv1'),b=document.getElementById('sv2');
  if(!a||!b)return;
  let cur=a,nxt=b,busy=false;
  const FADE=1.2;
  a.play().catch(()=>{});
  function tick(){
    if(!document.body.contains(a))return; // splash replaced — stop
    if(!busy&&cur.duration&&cur.duration-cur.currentTime<FADE){
      busy=true;
      nxt.currentTime=0;
      nxt.play().catch(()=>{});
      nxt.style.opacity='1';cur.style.opacity='0';
      setTimeout(()=>{const t=cur;cur=nxt;nxt=t;busy=false;},FADE*1000);
    }
    requestAnimationFrame(tick);
  }
  tick();
}

function onWrong(){
  if(rPhase!=='play'||elim.has(at))return;
  const prev=at;
  elim.add(at);sW();
  flashWrong();
  pushFlash();
  if(elim.size>=4){
    // all teams missed — host decides: second round of answers or reveal
    rPhase='all_wrong';push();render();
  }else{
    for(let k=1;k<=4;k++){const ni=(prev+k)%4;if(!elim.has(ni)){at=ni;break;}}
    push();render();
  }
}

function secondChance(){
  if(rPhase!=='all_wrong')return;
  elim=new Set();rPhase='play';push();render();
}

function startReveal(){
  if(rPhase!=='all_wrong')return;
  rq=QS[qi].a.map((_,i)=>i).filter(i=>!revealed.has(i));
  nextReveal();
}

function nextReveal(){
  if(rq.length===0){doEnd();return;}
  const[nxt,...rest]=rq;rq=rest;
  revealed.set(nxt,'auto_text');popAt(nxt);
  rPhase='auto_pause';sRT();push();render();
}

function showAutoPoints(){
  const entry=[...revealed.entries()].find(([_,v])=>v==='auto_text');
  if(!entry)return;
  const[idx]=entry;
  revealed.set(idx,'auto_full');sRP();
  if(rq.length===0){
    rPhase='auto_last';push();render();
  }else{
    push();render();
    if(spT)clearTimeout(spT);
    spT=setTimeout(()=>{rPhase='auto_reveal';push();if(nrT)clearTimeout(nrT);nrT=setTimeout(nextReveal,500);},400);
  }
}

function doEnd(){
  rPhase='end';overlayOn=true;push();render();
  eT=setTimeout(()=>{
    totals=totals.map((s,i)=>s+rs[i]);
    if(qi>=maxQ-1){
      screen='over';
      spawnConfetti();sFanfare();
      if(bc)bc.postMessage({t:'confetti'});
    }else{
      qi++;st=(st+1)%4;at=st;revealed=new Map();elim=new Set();rs=[0,0,0,0];rPhase='play';rq=[];
    }
    overlayOn=false;push();render();
  },3500);
}

function doFinishGame(){
  if(!confirm('Завершити гру зараз і показати підсумки?'))return;
  [eT,pT,nT,wrT,spT,nrT].forEach(t=>clearTimeout(t));
  totals=totals.map((s,i)=>s+rs[i]);
  screen='over';overlayOn=false;notif=null;
  push();render();
  spawnConfetti();sFanfare();
  if(bc)bc.postMessage({t:'confetti'});
}

function doStart(){
  saveAll();totals=[0,0,0,0];qi=0;st=startTeam;at=startTeam;
  revealed=new Map();elim=new Set();rs=[0,0,0,0];rPhase='play';rq=[];
  overlayOn=false;notif=null;screen='game';push();render();
}
function resetRound(){[eT,pT,nT,wrT,spT,nrT].forEach(t=>clearTimeout(t));revealed=new Map();elim=new Set();rs=[0,0,0,0];at=st;rPhase='play';rq=[];overlayOn=false;notif=null;popIdx=null;push();render();}
function goSetup(){screen='setup';push();render();}
function chooseHost(){mode='host';setupBC();ensureAmbient();render();}
function chooseDisplay(){mode='display';setupBC();ensureAmbient();if(bc){bc.postMessage({t:'ping'});pingInt=setInterval(()=>{if(waitHost&&bc)bc.postMessage({t:'ping'});else clearInterval(pingInt);},2000);}render();}

// ── Ambient bokeh stage layer: created once, survives all re-renders ──
function ensureAmbient(){
  if(document.getElementById('amb'))return;
  const amb=document.createElement('div');amb.id='amb';
  const cols=['#f5c518','#6eeb8c','#ffe08a','#4fd672'];
  for(let i=0;i<16;i++){
    const d=document.createElement('i');
    const sz=8+Math.random()*46;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;background:${cols[i%4]};--mx:${(Math.random()*12-6).toFixed(1)}vw;--my:${(Math.random()*10-5).toFixed(1)}vh;animation-duration:${(9+Math.random()*10).toFixed(1)}s;animation-delay:-${(Math.random()*12).toFixed(1)}s`;
    amb.appendChild(d);
  }
  document.body.appendChild(amb);
}

  return`<div class="team" style="background:${isAct?`linear-gradient(135deg,${c.p}cc,${c.p}66)`:'rgba(0,0,0,.45)'};border:2px solid ${isAct?c.g:isEl?'#333':c.p+'88'};box-shadow:${isAct?`0 0 22px ${c.g}55`:'none'};opacity:${isEl?.45:1}">
    ${isAct?`<div style="color:${c.g};font-size:8px;font-weight:800;margin-bottom:2px;letter-spacing:1px">▶ ХІД</div>`:''}

function hCard(i){

  const pop=popIdx===i;
  let bg,bdr,inner,extra='';
  if(!rev){bg='rgba(255,255,255,.05)';bdr='rgba(245,197,24,.4)';inner=`<span style="color:var(--gold);font-size:21px;font-weight:800">${i+1}</span>`;}

function hOver(){

function tvRanking(){
  const s=[...names.map((n,i)=>({n,s:totals[i],c:TC[i]}))].sort((a,b)=>b.s-a.s);
  return s.map((t,r)=>`<div class="${r===0?'win-card':''} fiu" style="display:flex;align-items:center;gap:2vw;background:${r===0?`linear-gradient(135deg,${t.c.p}99,${t.c.p}44)`:'rgba(0,0,0,.42)'};backdrop-filter:blur(12px);border:${r===0?'3px':'1px'} solid ${r===0?'var(--gold)':t.c.p+'99'};border-radius:1.4vw;padding:${r===0?'2.6vh 3vw':'1.8vh 2.6vw'};margin-bottom:1.6vh;animation-delay:${r*0.18}s;${r===0?'box-shadow:0 0 4vw rgba(245,197,24,.3)':''}">
    <span style="font-size:${r===0?'clamp(38px,4.6vw,90px)':'clamp(24px,2.6vw,52px)'}">${r===0?`<span class="win-trophy">🏆</span>`:['🥈','🥉','4️⃣'][r-1]}</span>
    <span style="flex:1;color:#fff;font-weight:800;font-size:${r===0?'clamp(24px,3vw,60px)':'clamp(18px,2vw,40px)'};text-align:left">${t.n}</span>
    <span style="color:var(--gold);font-weight:800;font-size:${r===0?'clamp(38px,4.6vw,90px)':'clamp(24px,2.8vw,56px)'}">${t.s}</span>
  </div>`).join('');
}

function hRanking(animate){
  const s=[...names.map((n,i)=>({n,s:totals[i],c:TC[i]}))].sort((a,b)=>b.s-a.s);
  return s.map((t,r)=>`<div class="${r===0?(animate?'win-card':''):''} fiu" style="display:flex;align-items:center;gap:11px;background:${r===0?`linear-gradient(135deg,${t.c.p}99,${t.c.p}55)`:'rgba(0,0,0,.42)'};border:${r===0?'2px':'1px'} solid ${r===0?'var(--gold)':t.c.p};border-radius:12px;padding:${r===0?'14px 18px':'11px 16px'};margin-bottom:8px;animation-delay:${r*0.15}s;backdrop-filter:blur(10px)">
    <span style="font-size:${r===0?'2.2rem':'1.4rem'}">${r===0?`<span class="${animate?'win-trophy':''}">🏆</span>`:['🥈','🥉','4️⃣'][r-1]}</span>
    <span style="flex:1;color:#fff;font-weight:700;font-size:${r===0?'1.15rem':'0.9rem'};text-align:left">${t.n}</span>
    <span style="color:var(--gold);font-weight:800;font-size:${r===0?'2.1rem':'1.5rem'}">${t.s}</span>
  </div>`).join('');
}

// ── Render ─────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(!mode){
    app.innerHTML=`<div class="mroot"><div class="mcard">
      <div style="color:var(--gold);font-size:2rem;margin-bottom:5px;font-weight:800">🎮 Гра-Шоу</div>
      <div style="color:#7dffa5;font-size:12px;margin-bottom:22px">Оберіть режим запуску</div>
      <div class="mbrow">
        <button class="mbtn mbd" onclick="chooseDisplay()"><div style="font-size:2.6rem">🖥️</div><div style="font-size:.95rem">ЕКРАН</div><div style="font-size:10px;font-weight:400;opacity:.85">Для проектора / TV<br>Без правильних відповідей</div></button>
        <button class="mbtn mbh" onclick="chooseHost()"><div style="font-size:2.6rem">🎛️</div><div style="font-size:.95rem">ВЕДУЧИЙ</div><div style="font-size:10px;font-weight:400;opacity:.85">Для вчителя<br>З панеллю відповідей</div></button>
      </div>
      <div class="minstr">
        <div class="mstep"><div class="mnum">1</div><div>Відкрий у <strong style="color:var(--gold)">двох вкладках</strong> (Ctrl+T / Cmd+T)</div></div>
        <div class="mstep"><div class="mnum">2</div><div>Перша → <strong style="color:#69f0ae">🖥️ Екран</strong> → телевізор → F11 повний екран</div></div>
        <div class="mstep"><div class="mnum">3</div><div>Друга → <strong style="color:#ff8a80">🎛️ Ведучий</strong> → ноутбук вчителя</div></div>
        <div class="mstep"><div class="mnum">4</div><div>Синхронізація автоматична, учні бачать лише дошку! 🎉</div></div>
      </div>
    </div></div>`;
    return;
  }

  if(mode==='display'){
    const spKey=waitHost?'wait':(screen==='setup'?'setup':null);
    if(spKey){
      if(splashKey===spKey&&document.getElementById('sv1'))return; // splash already on screen — don't restart video
      splashKey=spKey;
      app.innerHTML=splashHTML(spKey==='wait'
        ?`<div style="color:#ddd;font-size:clamp(15px,1.7vw,32px);text-align:center;line-height:1.8;text-shadow:0 2px 10px rgba(0,0,0,.8);animation:breathe 2.4s ease-in-out infinite">Очікуємо ведучого… відкрийте другу вкладку<br>та оберіть <strong style="color:#ff8a80">🎛️ Ведучий</strong></div>`
        :`<div style="color:#7dffa5;font-size:clamp(18px,2.2vw,44px);font-weight:700;text-shadow:0 2px 10px rgba(0,0,0,.8);animation:breathe 2.2s ease-in-out infinite">Готуємось до гри…</div>`);
      initSplashFade();return;
    }
    splashKey=null;
    if(screen==='over'){
      app.innerHTML=`<div class="tvroot" style="align-items:center;justify-content:center"><div style="text-align:center;width:100%;max-width:70vw;padding:3vh 2vw">
        <div style="font-size:clamp(40px,5.5vw,110px);margin-bottom:3vh;font-weight:800">🏆 <span class="goldtext">Гру завершено!</span></div>
        ${tvRanking()}
        <div style="color:#ffd54f;font-size:clamp(20px,2.4vw,46px);margin-top:2.5vh;font-weight:700;animation:fadeInUp .6s .8s var(--ease) both">Вітаємо переможців! 🎉</div>
      </div></div>`;
      return;
    }
    app.innerHTML=`<div class="tvroot">${tvBoard()}</div>`;return;
  }

  // ── HOST ──────────────────────────────────────────────────────────
  if(screen==='setup'){
    const stLabel=names.map((n,i)=>`<button onclick="setStartTeam(${i})" style="background:${startTeam===i?`linear-gradient(135deg,${TC[i].p}dd,${TC[i].p}88)`:'rgba(0,0,0,.4)'};border:1px solid ${startTeam===i?TC[i].g:TC[i].p};border-radius:var(--r-btn);padding:7px 3px;color:${startTeam===i?'#fff':TC[i].g};font-size:11px;font-family:inherit;font-weight:700;cursor:pointer;transition:transform .25s var(--ease),opacity .25s var(--ease),border-color .25s var(--ease),box-shadow .25s var(--ease),background-color .25s var(--ease);${startTeam===i?`box-shadow:0 0 12px ${TC[i].g}55`:''}">К${i+1}</button>`).join('');
    const qOpts=[1,2,5,QS.length].map(v=>`<button onclick="maxQ=${v};render()" style="background:${maxQ===v?'linear-gradient(135deg,#e8b813,#d97a12)':'rgba(0,0,0,.4)'};border:1px solid ${maxQ===v?'var(--gold)':'#555'};border-radius:var(--r-btn);padding:7px 6px;color:${maxQ===v?'#fff':'#aaa'};font-size:12px;font-family:inherit;cursor:pointer;font-weight:700;transition:transform .25s var(--ease),opacity .25s var(--ease),border-color .25s var(--ease),box-shadow .25s var(--ease),background-color .25s var(--ease)">${v===QS.length?'Всі':v}</button>`).join('');
    app.innerHTML=`<div class="sroot"><div class="scard">
      ${displayOk?`<div style="color:#55efc4;font-size:11px;margin-bottom:9px;text-align:center">📡 Екран підключено</div>`:bcOk?`<div style="color:#f39c12;font-size:11px;margin-bottom:9px;text-align:center">⚠️ Очікуємо підключення екрану…</div>`:`<div style="color:var(--muted);font-size:11px;margin-bottom:9px;text-align:center">Режим без синхронізації (одна вкладка)</div>`}
      <div style="color:var(--gold);font-size:1.6rem;text-align:center;margin-bottom:4px;font-weight:800">🎛️ Ведучий</div>
      <div style="color:#7dffa5;font-size:11px;text-align:center;margin-bottom:14px">Введіть назви команд та оберіть стартову</div>
      ${names.map((n,i)=>`<label for="i${i}" style="display:block;color:${TC[i].g};font-weight:700;margin-bottom:2px;font-size:11px">Команда ${i+1}</label><input class="sinp" id="i${i}" name="team${i+1}" autocomplete="off" spellcheck="false" value="${n}" style="border-color:${TC[i].p}" oninput="names[${i}]=this.value" placeholder="Назва команди ${i+1}…">`).join('')}
      <div style="margin-top:10px;margin-bottom:4px;color:var(--gold);font-size:11px;font-weight:700">Яка команда починає першою?</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px">${stLabel}</div>
      <div style="margin-bottom:4px;color:var(--gold);font-size:11px;font-weight:700">Кількість питань (кіл):</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px">${qOpts}</div>
      <button class="sbtn" onclick="doStart()">🚀 ПОЧАТИ ГРУ</button>
      <div style="color:var(--muted);font-size:10px;text-align:center;margin-top:7px">${QS.length} доступних питань • 8 відповідей кожне</div>
    </div></div>`;
    return;
  }
  if(screen==='over'){
    app.innerHTML=`<div class="sroot"><div style="text-align:center;width:100%;max-width:450px;padding:18px">
      <div style="color:var(--gold);font-size:1.9rem;margin-bottom:18px;font-weight:800">🏆 Гру завершено!</div>
      ${hRanking(false)}
      <button onclick="goSetup()" class="sbtn" style="max-width:280px">🔄 Нова гра</button>
    </div></div>`;
    return;
  }

  // Host game
  const Q=QS[qi],isPlay=rPhase==='play',isPause=rPhase==='auto_pause',isLast=rPhase==='auto_last',isAllWrong=rPhase==='all_wrong';
  const pauseEntry=[...revealed.entries()].find(([_,v])=>v==='auto_text');
  const lastEntry=[...revealed.entries()].find(([_,v])=>v==='auto_full'&&rPhase==='auto_last');
  const pIdx=pauseEntry?pauseEntry[0]:null;
  const lIdx=lastEntry?lastEntry[0]:null;
  app.innerHTML=`<div class="root">
    ${hBoard()}
    <div class="admin">
      <div style="color:rgba(245,197,24,.4);font-size:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
        <span>🎛 ВЕДУЧИЙ · відповіді бачите лише ви &nbsp;|&nbsp; ${displayOk?'<span style="color:#55efc4">📡 Підключено</span>':'<span style="color:var(--muted)">📵 Без екрану</span>'}</span>
        <button class="endnow" onclick="doFinishGame()">🏁 Завершити гру</button>
      </div>
      ${isPlay?`<div style="color:rgba(255,255,255,.42);font-size:10px;margin-bottom:4px;text-align:center">Оберіть активну команду (хід вручну):</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px">
          ${[0,1,2,3].map(i=>{const isAct=at===i,isEl=elim.has(i);return`<button onclick="selectTeam(${i})" ${isEl?'disabled':''} class="tbtn" style="background:${isAct?`linear-gradient(135deg,${TC[i].p}ee,${TC[i].p}99)`:isEl?'rgba(25,25,25,.5)':'rgba(20,20,20,.6)'};border-color:${isAct?TC[i].g:isEl?'#333':TC[i].p};color:${isAct?'#fff':isEl?'#333':TC[i].g};opacity:${isEl?.38:1};cursor:${isEl?'not-allowed':'pointer'};${isAct?`box-shadow:0 0 9px ${TC[i].g}55`:''}">${isEl?'❌ ':isAct?'▶ ':''}${names[i]}<div style="font-size:9px;color:${isAct?'var(--gold)':TC[i].g}">${totals[i]+rs[i]}б</div></button>`;}).join('')}
        </div>`:''}
      ${isAllWrong?`<div style="background:rgba(255,69,58,.08);border:1px solid rgba(255,69,58,.4);border-radius:10px;padding:8px 10px;margin-bottom:6px;text-align:center">
        <div style="color:#ff8a80;font-size:11px;font-weight:700;margin-bottom:6px">❌ Всі команди помилилися. Що робимо далі?</div>
        <div style="display:flex;gap:6px;justify-content:center">
          <button onclick="secondChance()" style="background:linear-gradient(135deg,#1a8a3a,#30d158);border:none;border-radius:var(--r-btn);padding:8px 16px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🔁 Друге коло відповідей</button>
          <button onclick="startReveal()" style="background:linear-gradient(135deg,#e8b813,#d97a12);border:none;border-radius:var(--r-btn);padding:8px 16px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">👁 Відкрити відповіді</button>
        </div>
      </div>`:''}
      ${isPause&&pIdx!==null?`<div style="background:rgba(255,220,0,.07);border:1px solid rgba(255,220,0,.32);border-radius:10px;padding:7px 10px;margin-bottom:6px;text-align:center">
        <div style="color:#ffd54f;font-size:11px;font-weight:700;margin-bottom:5px">⏸ Обговоріть: "<em>${Q.a[pIdx][0]}</em>"</div>
        <button onclick="showAutoPoints()" style="background:linear-gradient(135deg,#e8b813,#d97a12);border:none;border-radius:var(--r-btn);padding:7px 18px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">▶ Показати бали (${Q.a[pIdx][1]}б)</button>
      </div>`:''}
      ${isLast&&lIdx!==null?`<div style="background:rgba(48,209,88,.1);border:1px solid rgba(48,209,88,.4);border-radius:10px;padding:7px 10px;margin-bottom:6px;text-align:center">
        <div style="color:#7dffa5;font-size:11px;font-weight:700;margin-bottom:5px">✅ Всі відповіді відкрито! "${Q.a[lIdx][0]}": ${Q.a[lIdx][1]}б</div>
        <button onclick="doEnd()" style="background:linear-gradient(135deg,#1a8a3a,#30d158);border:none;border-radius:var(--r-btn);padding:7px 18px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">✅ Завершити раунд</button>
      </div>`:''}
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:5px">
        ${Q.a.map(([txt,pts],i)=>{const isRev=revealed.has(i),d=isRev||!isPlay;return`<button onclick="onCorrect(${i})" ${d?'disabled':''} class="abtn${isRev?' adone':''}"><span style="color:${isRev?'#55efc4':'var(--gold)'};font-size:10px;font-weight:800">${isRev?'✓':'#'+(i+1)} ${pts}б</span><span style="font-size:11px;text-decoration:${isRev?'line-through':'none'}">${txt}</span></button>`;}).join('')}
      </div>
      <div style="display:flex;gap:5px">
        <button class="wrong" onclick="onWrong()" ${!isPlay?'disabled':''} style="opacity:${isPlay?1:.38}">❌ НЕПРАВИЛЬНА ВІДПОВІДЬ</button>
        <button onclick="resetRound()" class="rreset">🔄 Перезапустити</button>
      </div>
    </div>
  </div>`;
}
render();
</script>
